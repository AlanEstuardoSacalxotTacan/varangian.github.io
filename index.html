<style>

/* Supabase sync */
#sync-indicator{position:fixed;top:6px;right:52px;font-size:8px;font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;z-index:8000;padding:2px 7px;border:1px solid;pointer-events:auto;opacity:0;transition:opacity .4s}
#sync-indicator.show{opacity:1}
#sync-indicator.sync-ok{color:#2ecc71;border-color:#1a5c2c;background:#020805}
#sync-indicator.sync-err{color:#e74c3c;border-color:#5c1a1a;background:#080202}
#sync-indicator.sync-ing{color:#f1c40f;border-color:#5c4800;background:#080800}

.sb-cfg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}

<body>
<div id="root"></div>
<div id="toast"></div>
<div id="profile-overlay"></div>
<div id="sync-indicator"></div>
<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const MG_N=[1,2,5,11],MG_R=[23,50,104],MG_FULL=[1,2,5,11,23,50,104],SK='jormund_v5';
const BIDS=['b1','b2','b3'];
const BR_CFG={
  b1:{name:'BROKER 1',label:'AZUL',   color:'#3498db',border:'#1a4a6c',dim:'#0a1e2e'},
  b2:{name:'BROKER 2',label:'VERDE',  color:'#2ecc71',border:'#1a5c2c',dim:'#0a1e12'},
  b3:{name:'BROKER 3',label:'NARANJA',color:'#e67e22',border:'#5c3000',dim:'#1e0f00'},
};
const PROFILE_LIST_KEY='jormund_profiles';
const ACTIVE_PROFILE_KEY='jormund_active_profile';
const SB_CFG_KEY='jormund_sb_cfg';

// ─── SUPABASE LAYER ───────────────────────────────────────────────────────────
let _sb=null;          // supabase client instance
let _sbReady=false;    // true once connected & tested
let _sbRealtime=null;  // active realtime subscription
let _syncTimer=null;
let _pendingSync=false;

function sbCfgLoad(){
  try{return JSON.parse(localStorage.getItem(SB_CFG_KEY)||'{}');}catch(e){return{};}
}
function sbCfgSave(url,key){
  localStorage.setItem(SB_CFG_KEY,JSON.stringify({url:url.trim(),key:key.trim()}));
}

async function sbInit(url,anonKey){
  try{
    if(!url||!anonKey)return false;
    _sb=supabase.createClient(url.trim(),anonKey.trim(),{
      realtime:{params:{eventsPerSecond:10}},
      auth:{persistSession:false}
    });
    // Test connection: upsert a probe row
    const {error}=await _sb.from('profile_state').select('profile_id').limit(1);
    if(error&&error.code!=='PGRST116'){console.warn('SB test:',error);_sb=null;_sbReady=false;return false;}
    _sbReady=true;
    syncIndicator('ok','SUPABASE OK');
    return true;
  }catch(e){console.warn('sbInit error:',e);_sb=null;_sbReady=false;return false;}
}

function syncIndicator(type,msg){
  const el=document.getElementById('sync-indicator');if(!el)return;
  el.textContent=msg;el.className='show sync-'+type;
  clearTimeout(window._syncIndTimer);
  if(type==='ok'||type==='live')window._syncIndTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// Write full profile state to Supabase (upsert)
async function sbPersist(pid,stateObj){
  if(!_sb||!_sbReady||!pid)return;
  syncIndicator('ing','SYNCING…');
  try{
    const {error}=await _sb.from('profile_state').upsert(
      {profile_id:pid, state_json:stateObj, updated_at:new Date().toISOString()},
      {onConflict:'profile_id'}
    );
    if(error){syncIndicator('err','SYNC ERR');console.warn('sbPersist:',error);}
    else syncIndicator('ok','SYNCED ✓');
  }catch(e){syncIndicator('err','SYNC ERR');console.warn('sbPersist ex:',e);}
}

// Write profiles list to Supabase
async function sbPersistProfiles(list){
  if(!_sb||!_sbReady)return;
  try{
    await _sb.from('profile_list').upsert(
      {id:'global',profiles:list,updated_at:new Date().toISOString()},
      {onConflict:'id'}
    );
  }catch(e){console.warn('sbPersistProfiles:',e);}
}

// Read profile state from Supabase
async function sbHydrate(pid){
  if(!_sb||!_sbReady||!pid)return null;
  try{
    const {data,error}=await _sb.from('profile_state').select('state_json').eq('profile_id',pid).single();
    if(error||!data)return null;
    return data.state_json;
  }catch(e){return null;}
}

// Read profiles list from Supabase
async function sbLoadProfiles(){
  if(!_sb||!_sbReady)return null;
  try{
    const {data,error}=await _sb.from('profile_list').select('profiles').eq('id','global').single();
    if(error||!data)return null;
    return data.profiles;
  }catch(e){return null;}
}

// Delete profile state from Supabase
async function sbDeleteProfile(pid){
  if(!_sb||!_sbReady)return;
  try{await _sb.from('profile_state').delete().eq('profile_id',pid);}catch(e){}
}

// Subscribe to realtime changes for active profile
function sbSubscribe(pid){
  if(!_sb||!_sbReady||!pid)return;
  sbUnsubscribe();
  _sbRealtime=_sb.channel('profile_'+pid)
    .on('postgres_changes',
      {event:'UPDATE',schema:'public',table:'profile_state',filter:'profile_id=eq.'+pid},
      (payload)=>{
        // Another client updated this profile — reload state if not currently persisting
        if(_pendingSync)return;
        const remote=payload.new?.state_json;
        if(!remote)return;
        syncIndicator('live','↓ LIVE UPDATE');
        applyState(remote);
        render();
      }
    ).subscribe();
}
function sbUnsubscribe(){
  if(_sbRealtime){try{_sb.removeChannel(_sbRealtime);}catch(e){}}_sbRealtime=null;
}

// ─── PROFILE SYSTEM ───────────────────────────────────────────────────────────
function profileStateKey(pid){return'jormund_profile_'+pid+'_state';}
function loadProfileList(){try{return JSON.parse(localStorage.getItem(PROFILE_LIST_KEY)||'[]');}catch(e){return[];}}
function saveProfileList(list){
  try{localStorage.setItem(PROFILE_LIST_KEY,JSON.stringify(list));}catch(e){}
  sbPersistProfiles(list);
}
function getActiveProfileId(){return localStorage.getItem(ACTIVE_PROFILE_KEY)||null;}
function setActiveProfileId(pid){localStorage.setItem(ACTIVE_PROFILE_KEY,pid);}
function createProfile(name){
  const pid='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
  const list=loadProfileList();list.push({id:pid,name:name.trim(),createdAt:new Date().toISOString()});
  saveProfileList(list);return pid;
}
function deleteProfile(pid){
  const list=loadProfileList().filter(p=>p.id!==pid);saveProfileList(list);
  try{localStorage.removeItem(profileStateKey(pid));}catch(e){}
  sbDeleteProfile(pid);
}
function renameProfile(pid,newName){

// ─── STATE ────────────────────────────────────────────────────────────────────
function defBroker(id){
  return{id,enabled:true,capital:0,initialCapital:0,asset:'',payout:92,
    mgCustomEnabled:false,
    mgNormalCustom:[],
    sessions:[],blocks:[],trades:[],tickets:[],
    activeSessionId:null,activeBlockId:null,
    blockMG:{level:0,accLoss:0},
    recState:{active:false,ticketIds:[],curIdx:0,level:0},
    dailyTarget:66.67};
}
let G={direction:'CALL',payoutDefault:92,dailyTarget:200,
  useRecoveryTickets:true,
  blockCooldownMinutes:5,
  cooldownUntil:null,
  blockCooldownMinutes:5,
  cooldownUntil:null,
  activeDayId:null,days:[],capitalHistory:[],
  _view:'register',_histTab:'ledger',
  _lf:{broker:'ALL',result:'ALL',mode:'ALL'},
  _tree:{},_ready:false};
let BS={b1:defBroker('b1'),b2:defBroker('b2'),b3:defBroker('b3')};
let _activeProfileId=null;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const uid=()=>'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const nowT=()=>{const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')};
const todayD=()=>new Date().toISOString().split('T')[0];
const fmt=v=>'$'+Math.abs(+v).toFixed(2);
const fmtS=v=>(+v>=0?'+':'-')+'$'+Math.abs(+v).toFixed(2);
const fmtP=v=>(+v>=0?'+':'')+parseFloat(v).toFixed(2)+'%';
const aDay=()=>G.days.find(d=>d.id===G.activeDayId)||null;
const b=id=>BS[id];
const bCap=id=>{const br=b(id);const last=[...br.trades].reverse()[0];return last?last.capitalAfter:br.capital};
const bASess=id=>{const br=b(id);return br.sessions.find(s=>s.id===br.activeSessionId)||null};
const bABlock=id=>{const br=b(id);return br.blocks.find(bl=>bl.id===br.activeBlockId)||null};
const bPendTkts=id=>b(id).tickets.filter(t=>t.status==='PENDING');
const bBTrades=(id,blockId)=>b(id).trades.filter(t=>t.blockId===blockId);
const totalCap=()=>BIDS.reduce((s,id)=>s+bCap(id),0);
const totalIni=()=>BIDS.reduce((s,id)=>s+(typeof b(id).initialCapital==='number'?b(id).initialCapital:0),0);
const totalPnl=()=>+(totalCap()-totalIni()).toFixed(2);
const allTrades=()=>BIDS.flatMap(id=>b(id).trades);
const allTkts=()=>BIDS.flatMap(id=>b(id).tickets);
function mgSeqForBroker(id,mode){
  const br=b(id);

  if(br && br.mgCustomEnabled){
    return Array.isArray(br.mgNormalCustom) && br.mgNormalCustom.length
      ? br.mgNormalCustom
      : MG_N;
  }

  if(mode==='normal') return MG_N;
  if(mode==='recovery') return MG_R;
  if(mode==='full') return MG_FULL;

  return MG_N;
}

function parseMGInput(raw){
  if(!raw || !raw.trim()) return null;

  const arr=raw.split(',')
    .map(x=>parseFloat(x.trim()))
    .filter(x=>!Number.isNaN(x));

  if(!arr.length) return null;
  if(arr.some(x=>x<=0)) return null;

  return arr;
}

function cooldownRemainingMs(){
  if(!G.cooldownUntil)return 0;
  return Math.max(0, Number(G.cooldownUntil) - Date.now());
}

function isCooldownActive(){
  return cooldownRemainingMs() > 0;
}

function isCooldownLocked(){
  return G.cooldownUntil !== null && typeof G.cooldownUntil !== 'undefined';
}

function cooldownNeedsContinue(){
  return isCooldownLocked() && cooldownRemainingMs() <= 0;
}

function continueAfterCooldown(){
  G.cooldownUntil=null;
  persist();
  render();
  toast('✓ GLOBAL COOLDOWN COMPLETADO — operación habilitada','g');
}

function cooldownText(){
  const ms=cooldownRemainingMs();
  if(ms<=0)return '00:00';
  const total=Math.ceil(ms/1000);
  const m=Math.floor(total/60);
  const s=total%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startGlobalCooldown(){
  const mins=Number(G.blockCooldownMinutes)||5;
  G.cooldownUntil=Date.now()+(mins*60*1000);
}

function clearExpiredCooldown(){
  if(G.cooldownUntil && cooldownRemainingMs()<=0){
    G.cooldownUntil=null;
  }
}

function saveBrokerMG(id){
  const br=b(id);if(!br)return;

  const enabled=document.getElementById('mg-custom-enabled-'+id)?.checked || false;
  const seq=parseMGInput(document.getElementById('mg-normal-'+id)?.value || '');

  if(enabled && !seq){
    toast('MG inválido en '+BR_CFG[id].name,'re');
    return;
  }

  br.mgCustomEnabled=enabled;
  br.mgNormalCustom=seq || [];

  br.blockMG={level:0,accLoss:0};

  if(enabled){
    br.recState={active:false,ticketIds:[],curIdx:0,level:0};
  }

  persist();
  render();

  toast('✓ CUSTOM MG '+BR_CFG[id].name+' '+(enabled?'ACTIVO':'DESACTIVADO'),enabled?'go':'g');
}

// ─── PERSIST / HYDRATE ───────────────────────────────────────────────────────
function stateSnapshot(){
  return{
    G:{direction:G.direction,payoutDefault:G.payoutDefault,dailyTarget:G.dailyTarget,
       useRecoveryTickets:G.useRecoveryTickets,
       blockCooldownMinutes:G.blockCooldownMinutes,
       cooldownUntil:G.cooldownUntil,
       activeDayId:G.activeDayId,days:G.days,capitalHistory:G.capitalHistory,
       _view:G._view,_histTab:G._histTab,_lf:G._lf,_tree:G._tree},
    BS};
}
function applyState(d){
  if(d.G)Object.assign(G,d.G);
  if(d.BS)BIDS.forEach(id=>{if(d.BS[id])BS[id]=Object.assign(defBroker(id),d.BS[id])});
  G._lf=G._lf||{broker:'ALL',result:'ALL',mode:'ALL'};G._tree=G._tree||{};
}

function persist(){
  if(!_activeProfileId)return;
  const snap=stateSnapshot();
  // 1. localStorage (immediate, always)
  try{localStorage.setItem(profileStateKey(_activeProfileId),JSON.stringify(snap));}catch(e){}
  // 2. Supabase (debounced 600ms to batch rapid clicks)
  _pendingSync=true;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(async()=>{
    await sbPersist(_activeProfileId,snap);
    _pendingSync=false;
  },600);
}

async function hydrate(){
  if(!_activeProfileId){G._ready=true;return;}
  // Try Supabase first (most up-to-date)
  let loaded=false;
  if(_sbReady){
    const remote=await sbHydrate(_activeProfileId);
    if(remote){applyState(remote);loaded=true;
      // Also update localStorage cache
      try{localStorage.setItem(profileStateKey(_activeProfileId),JSON.stringify(remote));}catch(e){}
    }
  }
  // Fallback to localStorage
  if(!loaded){
    try{
      const r=localStorage.getItem(profileStateKey(_activeProfileId));
      if(r){const d=JSON.parse(r);applyState(d);}
    }catch(e){}
  }
  G._ready=true;
}

async function loadProfile(pid){
  _activeProfileId=pid;setActiveProfileId(pid);
  Object.assign(G,{direction:'CALL',payoutDefault:92,dailyTarget:200,useRecoveryTickets:true,activeDayId:null,
    days:[],capitalHistory:[],_view:'register',_histTab:'ledger',
    _lf:{broker:'ALL',result:'ALL',mode:'ALL'},_tree:{},_ready:false});
  BS={b1:defBroker('b1'),b2:defBroker('b2'),b3:defBroker('b3')};
  // Load local first, immediately
  try{
    const r=localStorage.getItem(profileStateKey(pid));
    if(r){const d=JSON.parse(r);applyState(d);}
  }catch(e){}
  validateState();
  G._ready=true;
  document.getElementById('profile-overlay').style.display='none';
  safeRender();
  // Then try Supabase in background
  if(_sbReady){
    try{
      const remote=await sbHydrate(pid);
      if(remote){applyState(remote);validateState();
        localStorage.setItem(profileStateKey(pid),JSON.stringify(remote));
        safeRender();}
    }catch(e){}
  }
  sbSubscribe(pid);
}

// ─── DAY ──────────────────────────────────────────────────────────────────────
function openDay(){
  if(G.activeDayId)return;
  BIDS.forEach(id=>{
    const ce=document.getElementById('ini-cap-'+id);
    if(ce){const v=parseFloat(ce.value);if(v>0){BS[id].capital=v;BS[id].initialCapital=v;}}
    const pe=document.getElementById('br-payout-'+id);
    if(pe){const v=parseInt(pe.value);if(v>0)BS[id].payout=v;}
  });
  const dte=document.getElementById('inp-daily-target');
  if(dte){const v=parseFloat(dte.value);if(v>0){G.dailyTarget=v;BIDS.forEach(id=>BS[id].dailyTarget=+((v/3)).toFixed(2));}}
  const pwe=document.getElementById('inp-payout-default');
  if(pwe){const v=parseInt(pwe.value);if(v>0){G.payoutDefault=v;BIDS.forEach(id=>BS[id].payout=v);}}
  const cap=totalCap();
  const day={id:uid(),num:G.days.length+1,date:todayD(),status:'OPEN',openTime:nowT(),closeTime:null,capitalStart:cap,capitalEnd:null};
  G.days.push(day);G.activeDayId=day.id;
  G.capitalHistory.push({date:day.date,time:nowT(),capital:cap,note:'DAY '+day.num+' OPEN',dayNum:day.num});
  BIDS.forEach(id=>{
    const pend=bPendTkts(id);
    if(G.useRecoveryTickets&&pend.length){BS[id].recState={active:true,ticketIds:pend.map(t=>t.id),curIdx:0,level:0};pend[0].status='ACTIVE';}
    else BS[id].recState={active:false,ticketIds:[],curIdx:0,level:0};
  });
  persist();render();
}
function closeDay(){
  const day=aDay();if(!day)return;
  if(BIDS.some(id=>BS[id].activeSessionId)){toast('Cierra todas las sesiones primero','am');return}
  if(G.useRecoveryTickets&&BIDS.some(id=>BS[id].recState.active)){toast('Termina todos los recoveries','am');return}
  day.status='CLOSED';day.closeTime=nowT();day.capitalEnd=totalCap();G.activeDayId=null;
  persist();render();
}

// ─── RECOVERY ────────────────────────────────────────────────────────────────
function advRec(id){
  const br=b(id);const ni=br.recState.curIdx+1;
  if(ni<br.recState.ticketIds.length){
    br.recState.curIdx=ni;br.recState.level=0;
    const nxt=br.tickets.find(t=>t.id===br.recState.ticketIds[ni]);
    if(nxt)nxt.status='ACTIVE';
  }else{
    br.recState={active:false,ticketIds:[],curIdx:0,level:0};
    toast('✓ RECOVERY '+BR_CFG[id].name+' COMPLETADO','g');
  }
}
function regRecTrade(id,result){
  const day=aDay();const br=b(id);
  if(!day||!br.recState.active)return;
  const tkId=br.recState.ticketIds[br.recState.curIdx];
  const tk=br.tickets.find(t=>t.id===tkId);
  const amount=MG_R[br.recState.level];
  const py=br.payout/100;
  const profit=result==='WIN'?+(amount*py).toFixed(2):result==='LOSS'?-amount:0;
  const newCap=+(bCap(id)+profit).toFixed(2);
  const trade={id:uid(),brokerId:id,dayId:G.activeDayId,sessionId:null,blockId:null,
    tradeNum:br.trades.length+1,time:nowT(),date:todayD(),
    asset:br.asset||'—',direction:G.direction,amount,payout:br.payout,
    mgMode:'recovery',mgLevel:br.recState.level,result,profit,capitalAfter:newCap,ticketId:tkId,isRecovery:true};
  br.trades.push(trade);
  if(tk)tk.tradeIds.push(trade.id);
  if(result==='WIN'){if(tk)tk.status='RESOLVED';advRec(id);}
  else if(result==='LOSS'){
    if(br.recState.level<2){br.recState.level++;if(tk)tk.level=br.recState.level;}
    else{if(tk){tk.status='FAILED';tk.level=2;}advRec(id);}
  }
  persist();render();
}

// ─── BLOCK ────────────────────────────────────────────────────────────────────
function openBlock(id){
  if(isCooldownLocked()){
  toast(cooldownNeedsContinue()?'Presiona CONTINUE para habilitar operación':'GLOBAL COOLDOWN ACTIVE — '+cooldownText(),'am');
  return;
}
  const br=b(id);if(!br.enabled){toast(BR_CFG[id].name+' está DISABLED','am');return;}
  const sess=bASess(id);if(!sess||br.activeBlockId)return;
  const te=document.getElementById('blk-target-'+id);
  const pTarget=parseFloat(te?te.value:20)||20;
  const cap=bCap(id);
  const sBlk=br.blocks.filter(bl=>bl.sessionId===br.activeSessionId);
  const block={id:uid(),brokerId:id,sessionId:br.activeSessionId,dayId:G.activeDayId,
    num:sBlk.length+1,openTime:nowT(),closeTime:null,capitalIni:cap,capitalFin:cap,
    profit:0,roi:0,profitTarget:pTarget,status:'OPEN',tradeIds:[],cyclesCompleted:0,ticketsGenerated:[],cycleAccum:0};
  br.blocks.push(block);sess.blockIds.push(block.id);br.activeBlockId=block.id;
  br.blockMG={level:0,accLoss:0};persist();render();
}
function closeBlock(id){
  const br=b(id);const block=bABlock(id);if(!block)return;
  block.closeTime=nowT();block.capitalFin=bCap(id);
  block.profit=+(block.capitalFin-block.capitalIni).toFixed(2);
  block.roi=block.capitalIni?+(block.profit/block.capitalIni*100).toFixed(2):0;
  block.status='CLOSED';br.activeBlockId=null;br.blockMG={level:0,accLoss:0};
  const sess=bASess(id);if(sess)sess.capitalFin=bCap(id);

  const anyActiveBlock=BIDS.some(bid=>BS[bid].activeBlockId);
  if(!anyActiveBlock){
    startGlobalCooldown();
    toast('GLOBAL COOLDOWN INICIADO — '+cooldownText(),'go');
  }

  persist();render();
}

// ─── TRADE ────────────────────────────────────────────────────────────────────
function regTrade(id,result){
  if(isCooldownLocked()){
  toast(cooldownNeedsContinue()?'Presiona CONTINUE para habilitar operación':'GLOBAL COOLDOWN ACTIVE — '+cooldownText(),'am');
  return;
}
  const br=b(id);if(!br.enabled){toast(BR_CFG[id].name+' está DISABLED','am');return;}
  const block=bABlock(id);if(!block)return;
  const useRec=G.useRecoveryTickets && !br.mgCustomEnabled;
  const mgSeq=br.mgCustomEnabled?mgSeqForBroker(id,'normal'):(useRec?MG_N:MG_FULL);
  const stEl=document.getElementById('stake-'+id);
  const sugAmt=mgSeq[br.blockMG.level]||mgSeq[mgSeq.length-1];
  const amount=parseFloat(stEl?stEl.value:sugAmt)||sugAmt;
  const asEl=document.getElementById('asset-'+id);
  const asset=(asEl?asEl.value.toUpperCase():br.asset)||br.asset||'—';
  if(asset!=='—')br.asset=asset;
  const py=br.payout/100;
  const profit=result==='WIN'?+(amount*py).toFixed(2):result==='LOSS'?-amount:0;
  const newCap=+(bCap(id)+profit).toFixed(2);
  const mgMode=useRec?'normal':'full_martingale';
  const trade={id:uid(),brokerId:id,dayId:G.activeDayId,sessionId:br.activeSessionId,blockId:br.activeBlockId,
    tradeNum:block.tradeIds.length+1,time:nowT(),date:todayD(),
    asset,direction:G.direction,amount,payout:br.payout,
    mgMode,mgLevel:br.blockMG.level,result,profit,capitalAfter:newCap,ticketId:null,isRecovery:false};
  br.trades.push(trade);block.tradeIds.push(trade.id);
  block.capitalFin=newCap;block.profit=+(newCap-block.capitalIni).toFixed(2);
  const sess=bASess(id);if(sess)sess.capitalFin=newCap;
  if(result==='WIN'){
    const cycleNet=+(amount*py-br.blockMG.accLoss).toFixed(2);
    block.cycleAccum=+((block.cycleAccum||0)+cycleNet).toFixed(2);
    block.cyclesCompleted++;br.blockMG={level:0,accLoss:0};
  }else if(result==='LOSS'){
    const nAcc=+(br.blockMG.accLoss+amount).toFixed(2);
    const maxLevel=mgSeq.length-1;
    if(br.blockMG.level<maxLevel){br.blockMG.level++;br.blockMG.accLoss=nAcc;}
    else{
      if(br.mgCustomEnabled){
        toast('CUSTOM MG '+BR_CFG[id].name+' — secuencia reiniciada','go');
      }else if(useRec){
        // Generate recovery ticket
        const tk={id:'TKT-'+String(br.tickets.length+1).padStart(3,'0'),num:br.tickets.length+1,
          brokerId:id,originDate:todayD(),originDayId:G.activeDayId,originSessionId:br.activeSessionId,
          originBlockId:br.activeBlockId,originTradeId:trade.id,accLoss:nAcc,
          status:'PENDING',level:0,tradeIds:[],createdAt:nowT()};
        br.tickets.push(tk);block.ticketsGenerated.push(tk.id);trade.ticketId=tk.id;
        toast('⚠ '+tk.id+' generado en '+BR_CFG[id].name,'am');
      }else{
        // Full martingale: structural loss, reset to 0
        toast('⚠ STRUCTURAL LOSS '+BR_CFG[id].name+' — secuencia reiniciada','re');
      }
      br.blockMG={level:0,accLoss:0};block.cyclesCompleted++;
    }
  }
  // DRAW: no change to MG level
  if((block.cycleAccum||0)>=block.profitTarget&&result!=='DRAW')
    toast('✓ TARGET alcanzado en '+BR_CFG[id].name+' — Considera cerrar bloque','g');
  if(stEl)stEl.value=mgSeq[br.blockMG.level]||mgSeq[mgSeq.length-1];
  persist();render();
}

// ─── RENDER: BROKER CARD ──────────────────────────────────────────────────────
function rBrokerCard(id){
  const br=b(id);const cfg=BR_CFG[id];const day=aDay();
  const sess=bASess(id);const block=bABlock(id);
  const cap=bCap(id);
  const capDisplay=br.enabled?fmt(cap):'--.--';
  const sessPnl=sess?+(cap-sess.capitalIni).toFixed(2):0;
  const mgLvl=br.blockMG.level;
  const recActive=br.recState.active && !br.mgCustomEnabled; // custom MG no ejecuta recovery
  const mgSeq=br.mgCustomEnabled?mgSeqForBroker(id,'normal'):(G.useRecoveryTickets?MG_N:MG_FULL);
  const sugStake=mgSeq[Math.min(mgLvl,mgSeq.length-1)];
  const ca=block?+(block.cycleAccum||0).toFixed(2):0;
  const blockPnl=block?block.profit:0;
  const blockRoi=block&&block.capitalIni?+(blockPnl/block.capitalIni*100).toFixed(2):0;
  const pendCount=bPendTkts(id).length;

  // ── Header block control
  let blockCtrl='';
  if(!day) blockCtrl=`<span class="d2" style="font-size:9px">NO DAY</span>`;
  else if(recActive) blockCtrl=`<span class="badge bpend">RECOVERY ACTIVE</span>`;
  else if(!sess) blockCtrl=`<button class="btn btn-sm" style="border-color:${cfg.border};color:${cfg.color};font-size:9px" onclick="openSession('${id}')">▶ OPEN SESSION</button>`;
  else if(block) blockCtrl=`<span class="badge bopen" style="font-size:8px">BLOCK OPEN</span> <button class="btn btn-r btn-sm" style="font-size:9px" onclick="closeBlock('${id}')">CLOSE BLOCK</button>`;
  else blockCtrl=`<span class="badge bclosed" style="font-size:8px">BLOCK CLOSED</span> <button class="btn btn-sm" style="border-color:${cfg.border};color:${cfg.color};font-size:9px" onclick="openBlock('${id}')">▶ OPEN BLOCK</button>`;

  // ── OPERATIVA
  const opSection=`
    <div class="br-section-title">OPERATIVA</div>
    <div class="br-op-grid">
      <div><div class="br-label">ASSET</div>
        <input id="asset-${id}" value="${br.asset}" placeholder="EUR/USD..." style="height:26px;font-size:10px;text-transform:uppercase" oninput="BS['${id}'].asset=this.value.toUpperCase()"></div>
      <div><div class="br-label">STAKE ACTUAL</div>
        <div style="display:flex;align-items:center;gap:2px">
          <span class="d2" style="flex-shrink:0">$</span>
          <input id="stake-${id}" type="number" step="0.01" min="0.01" value="${block?sugStake:1}" style="height:26px;font-size:10px"></div></div>
      <div><div class="br-label">PAYOUT %</div>
        <input type="number" id="payout-${id}" value="${br.payout}" step="1" min="50" max="100" style="height:26px;font-size:10px" onchange="BS['${id}'].payout=parseInt(this.value);persist()"></div>
    </div>
    <div class="br-op-row" style="margin-top:6px">
      <div><div class="br-label">BALANCE</div><div style="font-size:13px;font-weight:500;color:${cfg.color}">${capDisplay}</div></div>
      <div><div class="br-label">P&L SESIÓN</div><div class="${sessPnl>=0?'g':'re'}" style="font-size:13px;font-weight:500">${sess?fmtS(sessPnl):'—'}</div></div>
      <div><div class="br-label">MG LEVEL</div><div style="font-size:13px">${mgLvl+1} / ${mgSeq.length}</div></div>
    </div>`;

  // ── BLOCK INFO
  const blockSection=sess?`
    <div class="br-section-title" style="margin-top:7px">BLOCK INFO</div>
    ${block&&ca>=block.profitTarget?`<div class="close-sug">✓ CYCLE GAINS +$${ca.toFixed(2)} ≥ $${block.profitTarget.toFixed(2)} — Considera cerrar</div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;font-size:10px">
      <div><div class="br-label">TARGET</div><div>${block?fmt(block.profitTarget):'—'}</div></div>
      <div><div class="br-label">P&L BLOQUE</div><div class="${blockPnl>=0?'g':'re'}">${block?fmtS(blockPnl):'—'}</div></div>
      <div><div class="br-label">ROI</div><div class="${blockRoi>=0?'g':'re'}">${block?fmtP(blockRoi):'—'}</div></div>
      <div><div class="br-label">CYCLES</div><div>${block?block.cyclesCompleted:'—'}</div></div>
      <div><div class="br-label">TKTS GEN</div><div class="${pendCount?'am':''}">${block?block.ticketsGenerated.length:pendCount||'—'}</div></div>
      <div><div class="br-label">CYCLE GAINS</div><div class="${ca>=(block?block.profitTarget:99)?'g':ca>0?'go':'d2'}">${block?'+$'+ca.toFixed(2):'—'}</div></div>
    </div>`:'';

  // ── MG BAR
  const mgBar=br.mgCustomEnabled?`
    <div class="br-section-title" style="margin-top:7px">CUSTOM MARTINGALE <span class="d2" style="font-size:7px;letter-spacing:0">${mgSeq.join('→')}</span></div>
    <div class="mg-row">
      ${mgSeq.map((v,i)=>{
        let cls='mg-n';
        if(block){if(i<mgLvl)cls+=' done';else if(i===mgLvl)cls+=' cur';}
        const isAct=block&&i===mgLvl;
        return`<div class="${cls}">${isAct?`<span class="mg-sub" style="color:#2ecc71">ACT</span>`:''}$${v}</div>${i<mgSeq.length-1?'<span class="mg-sep">›</span>':''}`;
      }).join('')}
    </div>`
  :G.useRecoveryTickets?`
    <div class="br-section-title" style="margin-top:7px">MARTINGALE SEQUENCE <span class="d2" style="font-size:7px;letter-spacing:0">NORMAL: 1-2-5-11 &nbsp;|&nbsp; RECOVERY: 23-50-104</span></div>
    <div class="mg-row">
      ${MG_N.map((v,i)=>{
        let cls='mg-n';
        if(block&&!recActive){if(i<mgLvl)cls+=' done';else if(i===mgLvl)cls+=' cur';}
        const isAct=block&&!recActive&&i===mgLvl;
        return`<div class="${cls}">${isAct?`<span class="mg-sub" style="color:#2ecc71">ACTUAL</span>`:''}$${v}</div>${i<3?'<span class="mg-sep">›</span>':''}`;
      }).join('')}
      <span class="mg-wall">|</span>
      ${MG_R.map((v,i)=>{
        let cls='mg-n rpend';
        if(recActive){if(i<br.recState.level)cls='mg-n rdone';else if(i===br.recState.level)cls='mg-n rcur';}
        const isAct=recActive&&i===br.recState.level;
        return`<div class="${cls}">${isAct?`<span class="mg-sub" style="color:#e67e22">ACTUAL</span>`:''}$${v}</div>${i<2?'<span class="mg-sep">›</span>':''}`;
      }).join('')}
    </div>`
  :`
    <div class="br-section-title" style="margin-top:7px">FULL MARTINGALE <span class="d2" style="font-size:7px;letter-spacing:0">1→2→5→11→23→50→104</span></div>
    <div class="mg-row">
      ${MG_FULL.map((v,i)=>{
        let cls='mg-n';
        if(block){if(i<mgLvl)cls+=' done';else if(i===mgLvl)cls+=' cur';}
        const isAct=block&&i===mgLvl;
        return`<div class="${cls}">${isAct?`<span class="mg-sub" style="color:#2ecc71">ACT</span>`:''}$${v}</div>${i<6?'<span class="mg-sep">›</span>':''}`;
      }).join('')}
    </div>`;

  // ── BOTONES
  let buttons='';
  if(recActive){
    const tkId=br.recState.ticketIds[br.recState.curIdx];
    const tk=br.tickets.find(t=>t.id===tkId);
    const assetEl=`<div style="margin-bottom:5px"><div class="br-label">ASSET</div>
      <input style="height:26px;font-size:10px;text-transform:uppercase" value="${br.asset}" placeholder="EUR/USD..." oninput="BS['${id}'].asset=this.value.toUpperCase()"></div>`;
    buttons=`
      <div class="br-section-title" style="margin-top:7px;color:#e67e22;border-color:#3a1000">RECOVERY — ${tkId||'?'} (${br.recState.curIdx+1}/${br.recState.ticketIds.length})</div>
      <div style="font-size:10px;margin-bottom:5px">Nivel: <span class="am" style="font-size:12px">$${MG_R[br.recState.level]}</span> &nbsp;|&nbsp; Loss acum: <span class="re">${tk?'-$'+Math.abs(tk.accLoss).toFixed(2):'—'}</span></div>
      ${assetEl}
      <div class="res-row">
        <button class="res-btn res-win" onclick="regRecTrade('${id}','WIN')">▲ WIN</button>
        <button class="res-btn res-loss" onclick="regRecTrade('${id}','LOSS')">▼ LOSS</button>
        <button class="res-btn res-draw" onclick="regRecTrade('${id}','DRAW')">= DRAW</button>
      </div>`;
  }else if(block){
    buttons=`
      <div class="br-section-title" style="margin-top:7px">BOTONES</div>
      <div class="res-row">
        <button class="res-btn res-win" onclick="regTrade('${id}','WIN')">▲ WIN</button>
        <button class="res-btn res-loss" onclick="regTrade('${id}','LOSS')">▼ LOSS</button>
        <button class="res-btn res-draw" onclick="regTrade('${id}','DRAW')">= DRAW</button>
      </div>`;
  }else if(sess){
    buttons=`
      <div class="br-section-title" style="margin-top:7px">OPEN BLOCK</div>
      <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:4px">
        <div style="min-width:90px"><div class="br-label">BLOCK TARGET ($)</div>
          <input id="blk-target-${id}" type="number" value="20" step="0.01" style="height:26px;font-size:10px"></div>
        <button class="btn btn-sm" style="border-color:${cfg.border};color:${cfg.color};height:26px" onclick="openBlock('${id}')">▶ OPEN BLOCK</button>
        <button class="btn btn-r btn-sm" style="height:26px" onclick="closeSession('${id}')">■ CLOSE SESSION</button>
      </div>`;
  }else if(day){
    buttons=`
      <div class="br-section-title" style="margin-top:7px">OPEN SESSION</div>
      <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:4px">
        <div style="flex:1;min-width:100px"><div class="br-label">ASSET DE SESIÓN</div>
          <input id="sess-asset-${id}" value="${br.asset}" placeholder="EUR/USD..." style="height:26px;font-size:10px;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
        <button class="btn btn-sm" style="border-color:${cfg.border};color:${cfg.color};height:26px" onclick="openSession('${id}')">▶ OPEN SESSION</button>
      </div>`;
  }

  // ── REGISTRO
  const brTrades=br.trades.filter(t=>!t.isRecovery).slice(-5).reverse();
  const logSection=`
    <div class="br-section-title" style="margin-top:7px">REGISTRO (ÚLTIMOS TRADES)</div>
    ${brTrades.length?`<div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>#</th><th>HORA</th><th>ASSET</th><th>DIR</th><th>STAKE</th><th>PAY</th><th>RES</th><th>P&L</th><th>BALANCE</th><th>MG</th></tr></thead>
      <tbody>${brTrades.map(t=>{
        const pc=t.profit>0?'g':t.profit<0?'re':'go';
        return`<tr>
          <td class="d2">${t.tradeNum}</td>
          <td class="d2">${t.time}</td>
          <td>${t.asset||'—'}</td>
          <td><span class="badge b${t.direction.toLowerCase()}">${t.direction}</span></td>
          <td>$${t.amount.toFixed(2)}</td>
          <td>${t.payout}%</td>
          <td><span class="badge b${t.result.toLowerCase()}">${t.result}</span></td>
          <td class="${pc}">${t.profit===0?'$0.00':fmtS(t.profit)}</td>
          <td>${fmt(t.capitalAfter)}</td>
          <td class="d2">${t.mgLevel+1}</td></tr>`;
      }).join('')}</tbody></table></div>`
    :`<div style="font-size:10px;color:#333">Sin trades recientes.</div>`}
    <div style="text-align:center;margin-top:6px">
      <button class="btn btn-sm" style="font-size:9px;color:#444;border-color:#1a1a1a" onclick="setView('history')">VER HISTORIAL COMPLETO</button>
    </div>`;

  return`<div class="br-card" style="border-top-color:${cfg.color}">
    <div class="br-header">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:${cfg.color};display:inline-block;flex-shrink:0"></span>
        <span style="font-weight:600;letter-spacing:1px;color:${cfg.color};font-size:11px">${cfg.name}</span>
      </div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        ${blockCtrl}
        <span class="badge" style="border-color:${br.enabled?cfg.border:'#222'};color:${br.enabled?cfg.color:'#444'};font-size:8px">${br.enabled?cfg.label:'DISABLED'}</span>
      </div>
    </div>
    <div class="br-body">
      ${opSection}
      ${blockSection}
      ${mgBar}
      ${buttons}
      ${logSection}
    </div>
  </div>`;
}

// ─── RENDER: SIDEBAR ─────────────────────────────────────────────────────────
function rSidebar(){
  const cap=totalCap();const ini=totalIni();

  const hPct=Math.min(100,Math.max(0,cap/ini*100));

  const cl=allTrades().filter(t=>t.result==='WIN'||t.result==='LOSS');
  const wins=cl.filter(t=>t.result==='WIN').length;
  const wr=cl.length?wins/cl.length*100:null;
  const allSessions=BIDS.flatMap(id=>b(id).sessions);
  const allBlocks=BIDS.flatMap(id=>b(id).blocks);
  const tkts=allTkts();
  const pend=tkts.filter(t=>t.status==='PENDING').length;
  const failed=tkts.filter(t=>t.status==='FAILED').length;

  return`
  <div class="panel">
    <div class="ptitle">CAPITAL HEALTH</div>
    <div style="margin-bottom:8px">
      <div class="stat-label">CAPITAL ACTUAL</div>
      <div class="stat-val ${pnl>=0?'g':'re'}">${fmt(cap)}</div>
      <div class="hbar"><div class="hfill" style="width:${hPct.toFixed(1)}%;background:${hCl}"></div></div>
      <div class="stat-sub">${hPct.toFixed(1)}% · base ${fmt(ini)}</div>
    </div>
    <div class="mini-row"><span class="d2">P&L TOTAL</span><span class="${pnl>=0?'g':'re'}">${fmtS(pnl)}</span></div>
    <div class="mini-row"><span class="d2">P&L %</span><span class="${pnlPct>=0?'g':'re'}">${fmtP(pnlPct)}</span></div>
    <div class="mini-row"><span class="d2">WIN RATE</span><span class="${wr!==null&&wr>=50?'g':'re'}">${wr!==null?wr.toFixed(0)+'%':'—'}</span></div>
    <div class="mini-row"><span class="d2">W / L / T</span><span>${wins}W·${cl.length-wins}L·${allTrades().length}T</span></div>
    <div style="border-top:1px solid #141414;margin:5px 0"></div>
    <div class="mini-row"><span class="d2">DÍAS</span><span>${G.days.length}</span></div>
    <div class="mini-row"><span class="d2">SESIONES</span><span>${allSessions.length}</span></div>
    <div class="mini-row"><span class="d2">BLOQUES</span><span>${allBlocks.length}</span></div>
    <div class="mini-row"><span class="d2">TKTS PEND</span><span class="${pend?'am':'d2'}">${pend}</span></div>
    <div class="mini-row"><span class="d2">P. ESTRUCT.</span><span class="${failed?'re':'d2'}">${failed}</span></div>
  </div>
  <div class="panel">
    <div class="ptitle">RECOVERY TICKETS (${activeTkts.length})</div>
    ${activeTkts.length?activeTkts.map(t=>{
      const bcfg=BR_CFG[t.brokerId]||{color:'#888',border:'#333'};
      const br2=b(t.brokerId);
      const curLvl=t.status==='ACTIVE'?br2.recState.level:t.level;
      const nxt=MG_R[Math.min(curLvl,2)];
      const nxtN=MG_R[Math.min(curLvl+1,2)];
      return`<div class="tkt tkt-${t.status}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
          <span style="color:${bcfg.color};font-size:9px;font-weight:600">${t.id}</span>
          <span class="badge b${t.status==='PENDING'?'pend':'act'}">${t.status}</span>
        </div>
        <div style="font-size:9px;color:#555;margin-bottom:3px">${t.originDate} · Loss: <span class="re">$${Math.abs(t.accLoss).toFixed(2)}</span></div>
        <div style="font-size:9px;display:flex;gap:8px;flex-wrap:wrap">
          <span>STK: <span class="am">$${nxt}</span></span>
          <span class="d2">NEXT: $${nxtN}</span>
          <span class="d2">LVL: ${curLvl+1}/7</span>
        </div>
      </div>`;
    }).join(''):`<div style="font-size:10px;color:#333">Sin tickets activos.</div>`}
  </div>`;
}

// ─── RENDER: DAILY TARGET ────────────────────────────────────────────────────

  const perB=+(G.dailyTarget/3).toFixed(2);
  const now=new Date();
  const ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  return`
  <div class="daily-bar">
    <div class="daily-section">

      <div style="font-size:13px;font-weight:500;margin-top:2px">${fmt(G.dailyTarget)}</div>
    </div>
    <div class="daily-section" style="flex:1;min-width:100px">
      <div class="gc-label">PROGRESO &nbsp;<span style="color:${pCl}">${Math.max(0,prog).toFixed(1)}%</span></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
        <div style="flex:1;height:3px;background:#181818">
          <div style="width:${Math.min(100,Math.max(0,prog)).toFixed(1)}%;height:100%;background:${pCl}"></div>
        </div>
      </div>
    </div>
    <div class="daily-section">
      <div class="gc-label">P&L DEL DÍA</div>
      <div class="${dayPnl>=0?'g':'re'}" style="font-size:13px;margin-top:2px">${fmtS(dayPnl)}</div>
    </div>
    <div class="daily-section">
      <div class="gc-label">SUGERENCIA</div>
      <div style="font-size:11px;margin-top:2px">${sugg}</div>
    </div>
    <div class="daily-section">
      <div class="gc-label">META POR BROKER</div>
      <div style="font-size:10px;margin-top:2px;display:flex;gap:8px">
        <span class="bl">B1: ${fmt(perB)}</span>
        <span class="g">B2: ${fmt(perB)}</span>
        <span class="am">B3: ${fmt(+(G.dailyTarget-perB*2).toFixed(2))}</span>
      </div>
    </div>
    <div class="daily-section">
      <div class="gc-label">HORA ACTUAL</div>
      <div style="font-size:11px;margin-top:2px" id="clock">${ts}</div>
    </div>
  </div>
  <div class="broker-targets">
    ${BIDS.map((id,i)=>{
      const cfg=BR_CFG[id];const br=b(id);const cap=bCap(id);
      const bIni=typeof br.initialCapital==='number'?br.initialCapital:0;
      const bPnl=day?+(cap-bIni).toFixed(2):0;
      const bProg=br.dailyTarget>0?bPnl/br.dailyTarget*100:0;
      const bCl=bProg>=100?'#2ecc71':bProg>=50?'#f1c40f':'#e67e22';
      const bRoi=bIni?+(bPnl/bIni*100).toFixed(2):0;
      return`<div class="bt-cell">
        <div class="gc-label" style="color:${cfg.color};margin-bottom:3px">${cfg.name} TARGET</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:10px">
          <span class="d2">TARGET: <span style="color:#fff">${fmt(br.dailyTarget)}</span></span>
          <span>PROGRESO: <span style="color:${bCl}">${bProg.toFixed(1)}%</span></span>
          <div style="width:50px;height:2px;background:#181818"><div style="width:${Math.min(100,Math.max(0,bProg)).toFixed(1)}%;height:100%;background:${bCl}"></div></div>
          <span class="${bPnl>=0?'g':'re'}">P&L: ${fmtS(bPnl)}</span>
          <span class="${bRoi>=0?'g':'re'}">ROI: ${fmtP(bRoi)}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ─── RENDER: HISTORY ─────────────────────────────────────────────────────────
function rHistory(){
  const cap=totalCap();const ini=totalIni();const pnl=totalPnl();
  const pnlPct=ini?+(pnl/ini*100).toFixed(2):0;
  const day=aDay();const dayPnl=day?+(cap-day.capitalStart).toFixed(2):0;
  const prog=G.dailyTarget>0?dayPnl/G.dailyTarget*100:0;
  const cl=allTrades().filter(t=>t.result==='WIN'||t.result==='LOSS');
  const wins=cl.filter(t=>t.result==='WIN').length;
  const wr=cl.length?wins/cl.length*100:null;
  const tkts=allTkts();const pend=tkts.filter(t=>t.status==='PENDING').length;
  const allSess=BIDS.flatMap(id=>b(id).sessions);
  const allBlks=BIDS.flatMap(id=>b(id).blocks);

  // Global summary cards
  const gcards=[
    ['CAPITAL TOTAL',fmt(cap),`P&L: ${fmtS(pnl)} (${fmtP(pnlPct)})`,pnl>=0?'g':'re'],
    ['WIN RATE',wr!==null?wr.toFixed(0)+'%':'—',`${wins}W · ${cl.length-wins}L · ${cl.length}`,wr!==null&&wr>=50?'g':'re'],
    ['PROGRESO META',prog.toFixed(1)+'%',`Meta: ${fmt(G.dailyTarget)}`,prog>=100?'g':prog>=50?'go':'am'],
    ['SESIONES',allSess.length,`${G.days.length} días`,''],
    ['BLOQUES',allBlks.length,`${allBlks.filter(bl=>bl.status==='CLOSED').length} cerrados`,''],
    ['TICKETS',tkts.length,`${pend} PEND · ${tkts.filter(t=>t.status==='FAILED').length} FAIL`,pend?'am':''],
  ];

  // History tabs
  const tabs=[['ledger','TRADE LEDGER'],['tree','TREE VIEW'],['sessions','SESIONES'],['blocks','BLOQUES'],['tickets','TICKETS']];

  // ── TRADE LEDGER
  let lf=G._lf||{broker:'ALL',result:'ALL',mode:'ALL'};
  let filtered=allTrades();
  if(lf.broker!=='ALL')filtered=filtered.filter(t=>t.brokerId===lf.broker);
  if(lf.result!=='ALL')filtered=filtered.filter(t=>t.result===lf.result);
  if(lf.mode!=='ALL'){
  filtered=filtered.filter(t=>{
    if(lf.mode==='REC') return t.isRecovery || t.mgMode==='recovery';
    if(lf.mode==='FULL') return t.mgMode==='full_martingale';
    if(lf.mode==='NORM') return !t.isRecovery && t.mgMode!=='full_martingale';
    return true;
  });
}
  const ledger=filtered.slice().reverse();

  const ledgerHtml=`
    <div class="filter-bar">
      <span class="d2" style="font-size:9px">FILTRAR:</span>
      <select onchange="setLF('broker',this.value)" style="width:100px">
        <option value="ALL" ${lf.broker==='ALL'?'selected':''}>TODOS</option>
        ${BIDS.map(id=>`<option value="${id}" ${lf.broker===id?'selected':''}>${BR_CFG[id].name}</option>`).join('')}
      </select>
      <select onchange="setLF('result',this.value)" style="width:80px">
        <option value="ALL" ${lf.result==='ALL'?'selected':''}>TODOS</option>
        <option value="WIN" ${lf.result==='WIN'?'selected':''}>WIN</option>
        <option value="LOSS" ${lf.result==='LOSS'?'selected':''}>LOSS</option>
        <option value="DRAW" ${lf.result==='DRAW'?'selected':''}>DRAW</option>
      </select>
      <select onchange="setLF('mode',this.value)" style="width:90px">
        <option value="ALL" ${lf.mode==='ALL'?'selected':''}>TODO MODO</option>
        <option value="NORM" ${lf.mode==='NORM'?'selected':''}>NORMAL</option>
        <option value="REC" ${lf.mode==='REC'?'selected':''}>RECOVERY</option>
        <option value="FULL" ${lf.mode==='FULL'?'selected':''}>FULL MG</option>
      </select>
      <span class="d2" style="font-size:9px">${ledger.length} trades</span>
    </div>
    ${ledger.length?`<div style="overflow-x:auto"><table class="tbl">
      <thead><tr>
        <th>#</th><th>BROKER</th><th>FECHA</th><th>HORA</th><th>DÍA</th><th>SESS</th><th>BLOQUE</th>
        <th>ASSET</th><th>DIR</th><th>STAKE</th><th>PAY</th><th>RES</th>
        <th>P&L TRADE</th><th>CAPITAL</th><th>MG LVL</th><th>MODO</th><th>TICKET</th>
      </tr></thead>
      <tbody>${ledger.map(t=>{
        const cfg=BR_CFG[t.brokerId]||{color:'#888',name:'?'};
        const br2=b(t.brokerId);
        const sess2=br2.sessions.find(s=>s.id===t.sessionId);
        const blk2=br2.blocks.find(bl=>bl.id===t.blockId);
        const dayN=G.days.find(d=>d.id===t.dayId);
        const pc=t.profit>0?'g':t.profit<0?'re':'go';
        const lvLbl=`L${t.mgLevel+1} $${Number(t.amount).toFixed(2)}`;
        const tp=t.result==='WIN'?`+$${(t.amount*(t.payout/100)).toFixed(2)}`:t.result==='LOSS'?`-$${t.amount.toFixed(2)}`:'$0.00';
        return`<tr>
          <td class="d2">${t.tradeNum}</td>
          <td><span style="color:${cfg.color};font-size:9px">${cfg.name}</span></td>
          <td class="d2">${t.date||''}</td>
          <td class="d2">${t.time}</td>
          <td class="d2">${dayN?'D'+dayN.num:'REC'}</td>
          <td class="d2">${sess2?'S'+sess2.num:'—'}</td>
          <td class="d2">${blk2?'B'+blk2.num:t.isRecovery?'REC':'—'}</td>
          <td>${t.asset||'—'}</td>
          <td><span class="badge b${(t.direction||'').toLowerCase()}">${t.direction||'—'}</span></td>
          <td>$${t.amount.toFixed(2)}</td>
          <td>${t.payout}%</td>
          <td><span class="badge b${t.result.toLowerCase()}">${t.result}</span></td>
          <td class="${pc}" style="font-weight:500">${tp}</td>
          <td>${fmt(t.capitalAfter)}</td>
          <td class="d2">${lvLbl}</td>
          <td class="${t.isRecovery?'am':t.mgMode==='full_martingale'?'go':'d2'}">${t.mgMode==='full_martingale'?'FULL_MG':t.mgMode.toUpperCase()}</td>
          <td class="d2">${t.ticketId||'—'}</td>
        </tr>`;
      }).join('')}</tbody></table></div>`
    :`<div style="font-size:10px;color:#333;padding:8px">Sin trades con estos filtros.</div>`}`;

  // ── TREE VIEW (DAY→SESSION→BLOCK→TRADES)
  const treeHtml=G.days.length?G.days.slice().reverse().map(day=>{
    const dk='d_'+day.id;const dOpen=G._tree[dk];
    const dSess=BIDS.flatMap(id=>b(id).sessions.filter(s=>s.dayId===day.id));
    const dPnl=day.capitalEnd?+(day.capitalEnd-day.capitalStart).toFixed(2):0;
    return`<div class="tree-day">
      <div class="tree-day-hdr" onclick="toggleTree('${dk}')">
        <span style="color:#444">${dOpen?'▾':'▸'}</span>
        <span class="go" style="font-weight:600">DAY ${day.num}</span>
        <span class="d2">${day.date}</span>
        <span class="badge b${day.status==='OPEN'?'open':'closed'}">${day.status}</span>
        <span class="${dPnl>=0?'g':'re'}">${fmtS(dPnl)}</span>
        <span class="d2" style="font-size:9px">${dSess.length} sessions</span>
      </div>
      ${dOpen?dSess.map(sess=>{
        const sk='s_'+sess.id;const sOpen=G._tree[sk];
        const cfg=BR_CFG[sess.brokerId]||{color:'#888',name:'?'};
        const sPnl=+(sess.capitalFin-sess.capitalIni).toFixed(2);
        const sBlks=b(sess.brokerId).blocks.filter(bl=>bl.sessionId===sess.id);
        return`<div class="tree-sess">
          <div class="tree-sess-hdr" onclick="toggleTree('${sk}')">
            <span style="color:#444">${sOpen?'▾':'▸'}</span>
            <span style="color:${cfg.color};font-size:9px">${cfg.name}</span>
            <span class="d2">S${sess.num}</span>
            <span class="badge b${sess.status==='OPEN'?'open':'closed'}">${sess.status}</span>
            <span class="${sPnl>=0?'g':'re'}">${fmtS(sPnl)}</span>
            <span class="d2" style="font-size:9px">${sess.openTime}${sess.closeTime?' → '+sess.closeTime:''}</span>
            <span class="d2" style="font-size:9px">${sBlks.length} bloques</span>
          </div>
          ${sOpen?sBlks.map(bl=>{
            const bk='b_'+bl.id;const bOpen=G._tree[bk];
            const blTs=bBTrades(sess.brokerId,bl.id);
            return`<div class="tree-blk">
              <div class="tree-blk-hdr" onclick="toggleTree('${bk}')">
                <span style="color:#333">${bOpen?'▾':'▸'}</span>
                <span>B${bl.num}</span>
                <span class="badge b${bl.status==='OPEN'?'open':'closed'}">${bl.status}</span>
                <span class="${bl.profit>=0?'g':'re'}">${fmtS(bl.profit)}</span>
                <span class="d2" style="font-size:9px">ROI: ${fmtP(bl.roi||0)}</span>
                <span class="d2" style="font-size:9px">${bl.openTime}${bl.closeTime?' → '+bl.closeTime:''}</span>
                <span class="d2" style="font-size:9px">${blTs.length} trades</span>
              </div>
              ${bOpen&&blTs.length?`<div class="tree-trades"><table class="tbl">
                <thead><tr><th>#</th><th>HORA</th><th>ASSET</th><th>DIR</th><th>STAKE</th><th>RES</th><th>P&L</th><th>CAPITAL</th><th>MG</th></tr></thead>
                <tbody>${blTs.map(t=>{
                  const pc=t.profit>0?'g':t.profit<0?'re':'go';
                  const tp=t.result==='WIN'?`+$${(t.amount*(t.payout/100)).toFixed(2)}`:t.result==='LOSS'?`-$${t.amount.toFixed(2)}`:'$0.00';
                  return`<tr>
                    <td class="d2">${t.tradeNum}</td><td class="d2">${t.time}</td>
                    <td>${t.asset||'—'}</td>
                    <td><span class="badge b${(t.direction||'').toLowerCase()}">${t.direction||'—'}</span></td>
                    <td>$${t.amount.toFixed(2)}</td>
                    <td><span class="badge b${t.result.toLowerCase()}">${t.result}</span></td>
                    <td class="${pc}" style="font-weight:500">${tp}</td>
                    <td>${fmt(t.capitalAfter)}</td>
                    <td class="d2">N${t.mgLevel+1}</td>
                  </tr>`;
                }).join('')}</tbody></table></div>`:bOpen?`<div class="tree-trades d2" style="font-size:9px">Sin trades.</div>`:''}
            </div>`;
          }).join(''):''}
        </div>`;
      }).join(''):''}
    </div>`;
  }).join(''):`<div style="font-size:10px;color:#333;padding:8px">Sin días registrados.</div>`;

  // ── SESSIONS TABLE
  const sessRows=BIDS.flatMap(id=>b(id).sessions).sort((a,b2)=>a.openTime>b2.openTime?-1:1).map(s=>{
    const p=+(s.capitalFin-s.capitalIni).toFixed(2);const r=s.capitalIni?+(p/s.capitalIni*100).toFixed(2):0;
    const cfg=BR_CFG[s.brokerId]||{color:'#888',name:'?'};
    const st=b(s.brokerId).trades.filter(t=>t.sessionId===s.id&&!t.isRecovery);
    const sw=st.filter(t=>t.result==='WIN').length;
    const dayN=G.days.find(d=>d.id===s.dayId);
    return`<tr>
      <td style="color:${cfg.color}">${cfg.name}</td>
      <td class="d2">${dayN?'D'+dayN.num:'?'}</td>
      <td class="d2">S${s.num}</td><td>${s.date}</td>
      <td class="d2">${s.openTime}${s.closeTime?' → '+s.closeTime:''}</td>
      <td>${s.asset||'—'}</td><td>${fmt(s.capitalIni)}</td><td>${fmt(s.capitalFin)}</td>
      <td class="${p>=0?'g':'re'}">${fmtS(p)}</td>
      <td class="${r>=0?'g':'re'}">${fmtP(r)}</td>
      <td>${b(s.brokerId).blocks.filter(bl=>bl.sessionId===s.id).length}</td>
      <td>${st.length?sw+'W·'+(st.length-sw)+'L':'—'}</td>
      <td><span class="badge b${s.status==='OPEN'?'open':'closed'}">${s.status}</span></td>
    </tr>`;
  }).join('');

  // ── BLOCKS TABLE
  const blkRows=BIDS.flatMap(id=>b(id).blocks).slice().reverse().map(bl=>{
    const cfg=BR_CFG[bl.brokerId]||{color:'#888',name:'?'};
    const sess2=b(bl.brokerId).sessions.find(s=>s.id===bl.sessionId);
    const roi=bl.roi||(bl.capitalIni?+(bl.profit/bl.capitalIni*100).toFixed(2):0);
    return`<tr>
      <td style="color:${cfg.color}">${cfg.name}</td>
      <td class="d2">B${bl.num}</td>
      <td class="d2">${sess2?'S'+sess2.num:'?'}</td>
      <td class="d2">${bl.openTime}${bl.closeTime?' → '+bl.closeTime:''}</td>
      <td>${fmt(bl.capitalIni)}</td><td>${fmt(bl.capitalFin)}</td>
      <td class="${bl.profit>=0?'g':'re'}">${fmtS(bl.profit)}</td>
      <td class="${roi>=0?'g':'re'}">${fmtP(roi)}</td>
      <td>${bl.cyclesCompleted}</td><td>${bl.tradeIds.length}</td>
      <td class="${bl.ticketsGenerated.length?'am':'d2'}">${bl.ticketsGenerated.length}</td>
      <td><span class="badge b${bl.status==='OPEN'?'open':'closed'}">${bl.status}</span></td>
    </tr>`;
  }).join('');

  // ── TICKETS TABLE
  const tktRows=BIDS.flatMap(id=>b(id).tickets).slice().reverse().map(t=>{
    const cfg=BR_CFG[t.brokerId]||{color:'#888',name:'?'};
    return`<tr>
      <td style="color:${cfg.color}">${cfg.name}</td>
      <td class="go">${t.id}</td>
      <td>${t.originDate}</td>
      <td class="d2">$${Math.abs(t.accLoss).toFixed(2)}</td>
      <td><span class="badge b${t.status==='PENDING'?'pend':t.status==='ACTIVE'?'act':t.status==='RESOLVED'?'res':'fail'}">${t.status}</span></td>
      <td class="am">$${MG_R[Math.min(t.level||0,2)]}</td>
      <td class="d2">${t.tradeIds.length}</td>
    </tr>`;
  }).join('');

  // ── BROKER SUMMARIES
  const brokerSummaries=BIDS.map(id=>{
    const cfg=BR_CFG[id];const br=b(id);const cap=bCap(id);
    const bIni=typeof br.initialCapital==='number'?br.initialCapital:0;
    const pnl2=+(cap-bIni).toFixed(2);const pnlPct2=bIni?+(pnl2/bIni*100).toFixed(2):0;
    const bTrades2=br.trades.filter(t=>t.result==='WIN'||t.result==='LOSS');
    const bWins=bTrades2.filter(t=>t.result==='WIN').length;
    const wr2=bTrades2.length?bWins/bTrades2.length*100:null;
    const pend2=br.tickets.filter(t=>t.status==='PENDING').length;
    return`<div class="hist-card" style="border-top:2px solid ${cfg.color}">
      <div class="hist-card-label" style="color:${cfg.color}">${cfg.name}</div>
      <div class="hist-card-val ${pnl2>=0?'g':'re'}">${fmt(cap)}</div>
      <div class="hist-card-sub">P&L: ${fmtS(pnl2)} (${fmtP(pnlPct2)})</div>
      <div style="margin-top:5px;font-size:10px;display:flex;flex-direction:column;gap:2px">
        <div class="mini-row"><span class="d2">WIN RATE</span><span class="${wr2!==null&&wr2>=50?'g':'re'}">${wr2!==null?wr2.toFixed(0)+'%':'—'}</span></div>
        <div class="mini-row"><span class="d2">TRADES</span><span>${br.trades.length}</span></div>
        <div class="mini-row"><span class="d2">TKT PEND</span><span class="${pend2?'am':'d2'}">${pend2}</span></div>
      </div>
    </div>`;
  }).join('');

  const tabContent={
    ledger:ledgerHtml,
    tree:treeHtml,
    sessions:allSess.length?`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>BROKER</th><th>DÍA</th><th>#</th><th>FECHA</th><th>HORARIO</th><th>ASSET</th><th>CAP INI</th><th>CAP FIN</th><th>P&L</th><th>ROI</th><th>BLOQUES</th><th>W/L</th><th>STATUS</th></tr></thead><tbody>${sessRows}</tbody></table></div>`:`<div class="d2" style="font-size:10px">Sin sesiones.</div>`,
    blocks:allBlks.length?`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>BROKER</th><th>B#</th><th>SESS</th><th>HORARIO</th><th>CAP INI</th><th>CAP FIN</th><th>P&L</th><th>ROI</th><th>CYCLES</th><th>TRADES</th><th>TKTS</th><th>STATUS</th></tr></thead><tbody>${blkRows}</tbody></table></div>`:`<div class="d2" style="font-size:10px">Sin bloques.</div>`,
    tickets:tkts.length?`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>BROKER</th><th>ID</th><th>FECHA</th><th>LOSS ACUM</th><th>STATUS</th><th>NIVEL ACT</th><th>TRADES REC</th></tr></thead><tbody>${tktRows}</tbody></table></div>`:`<div class="d2" style="font-size:10px">Sin tickets.</div>`,
  };

  return`<div class="hist-main">
    <div class="hist-cards">
      ${gcards.map(([l,v,s,c])=>`<div class="hist-card"><div class="hist-card-label">${l}</div>
        <div class="hist-card-val ${c}">${v}</div>
        <div class="hist-card-sub">${s}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px">${brokerSummaries}</div>
    <div class="hist-panel">
      <div class="hist-ptitle">
        <div style="display:flex;gap:0">
          ${tabs.map(([k,l])=>`<div onclick="setHistTab('${k}')" style="padding:3px 12px;cursor:pointer;font-size:9px;letter-spacing:1.5px;border-bottom:2px solid ${G._histTab===k?'#f1c40f':'transparent'};color:${G._histTab===k?'#f1c40f':'#444'}">${l}</div>`).join('')}
        </div>
        <span class="d2" style="font-size:9px">${allTrades().length} trades totales</span>
      </div>
      ${tabContent[G._histTab]||ledgerHtml}
    </div>
  </div>`;
}

// ─── EXPORT XLSX ──────────────────────────────────────────────────────────────
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  const allSess=BIDS.flatMap(id=>b(id).sessions);
  const allBlks=BIDS.flatMap(id=>b(id).blocks);
  const s1=[['BROKER','#','FECHA','INI','FIN','ASSET','PAYOUT','CAP INI','CAP FIN','P&L','ROI%','BLOQUES','STATUS']];
  allSess.forEach(s=>{const p=+(s.capitalFin-s.capitalIni).toFixed(2);const r=s.capitalIni?+(p/s.capitalIni*100).toFixed(2):0;s1.push([BR_CFG[s.brokerId]?.name||s.brokerId,'S'+s.num,s.date,s.openTime,s.closeTime||'OPEN',s.asset,(s.payout||92)+'%',s.capitalIni,s.capitalFin,p,r+'%',s.blockIds.length,s.status]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'SESIONES');
  const s2=[['BROKER','#','SESS','HORA INI','HORA FIN','CAP INI','CAP FIN','P&L','ROI%','CYCLES','TRADES','TKTS','STATUS']];
  allBlks.forEach(bl=>{const sess2=b(bl.brokerId).sessions.find(s=>s.id===bl.sessionId);const roi=bl.roi||(bl.capitalIni?+(bl.profit/bl.capitalIni*100).toFixed(2):0);s2.push([BR_CFG[bl.brokerId]?.name||bl.brokerId,'B'+bl.num,sess2?'S'+sess2.num:'?',bl.openTime,bl.closeTime||'OPEN',bl.capitalIni,bl.capitalFin,bl.profit,roi+'%',bl.cyclesCompleted,bl.tradeIds.length,bl.ticketsGenerated.length,bl.status]);});

// ─── TICKET MANAGEMENT ───────────────────────────────────────────────────────
function markTicketResolved(brokerId,ticketId){
  const br=b(brokerId);if(!br)return;
  const tk=br.tickets.find(t=>t.id===ticketId);if(!tk)return;
  tk.status='RESOLVED';
  // Clean recState if this ticket was active
  if(br.recState.active&&br.recState.ticketIds.includes(ticketId)){
    br.recState={active:false,ticketIds:[],curIdx:0,level:0};
  }
  persist();render();
  toast('✓ '+ticketId+' marcado como RESOLVED','g');
}

function markTicketFailed(brokerId,ticketId){
  const br=b(brokerId);if(!br)return;
  const tk=br.tickets.find(t=>t.id===ticketId);if(!tk)return;
  tk.status='FAILED';
  if(br.recState.active&&br.recState.ticketIds.includes(ticketId)){
    br.recState={active:false,ticketIds:[],curIdx:0,level:0};
  }
  persist();render();
  toast('⚠ '+ticketId+' marcado como FAILED','re');
}

function reactivateTicketRecovery(brokerId,ticketId){
  const br=b(brokerId);if(!br)return;
  if(!br.enabled){toast(BR_CFG[brokerId].name+' está DISABLED','am');return;}
  const tk=br.tickets.find(t=>t.id===ticketId);if(!tk)return;
  if(br.recState.active){toast('Ya hay un recovery activo en '+BR_CFG[brokerId].name,'am');return;}
  if(!aDay()){toast('Abre un día antes de reactivar recovery','am');return;}
  tk.status='ACTIVE';
  br.recState={active:true,ticketIds:[ticketId],curIdx:0,level:tk.level||0};
  persist();render();
  toast('⚡ RECOVERY reactivado — '+ticketId+' en '+BR_CFG[brokerId].name,'go');
}

function saveInitialCapital(id){

  if(br.trades.length>0&&!confirm('Este broker ya tiene trades. ¿Confirmar cambio de capital inicial?\nNota: no se borran trades anteriores.')){return;}
  br.initialCapital=v;br.capital=v;

}

// ─── SUPABASE UI ACTIONS ─────────────────────────────────────────────────────
async function sbConnect(){
  const url=document.getElementById('sb-url')?.value?.trim();
  const key=document.getElementById('sb-key')?.value?.trim();
  if(!url||!key){toast('URL y Key requeridos','re');return;}
  sbCfgSave(url,key);
  toast('Conectando…','go');
  const ok=await sbInit(url,key);
  if(ok){
    toast('✓ Supabase conectado','g');
    // Pull profiles list from Supabase and merge
    const remoteProfiles=await sbLoadProfiles();
    if(remoteProfiles&&remoteProfiles.length){
      const local=loadProfileList();
      const merged=[...local];
      remoteProfiles.forEach(rp=>{if(!merged.find(lp=>lp.id===rp.id))merged.push(rp);});
      try{localStorage.setItem(PROFILE_LIST_KEY,JSON.stringify(merged));}catch(e){}
    }
    if(_activeProfileId)sbSubscribe(_activeProfileId);
  }else{
    toast('✗ Error de conexión — revisa URL y Key','re');
  }
  render();
}
function sbDisconnect(){
  sbUnsubscribe();_sb=null;_sbReady=false;
  toast('Supabase desconectado','am');render();
}
async function sbPushNow(){
  if(!_sbReady){toast('Supabase no conectado','re');return;}
  await sbPersist(_activeProfileId,stateSnapshot());
  toast('✓ Estado enviado a Supabase','g');
}
async function sbPullNow(){
  if(!_sbReady){toast('Supabase no conectado','re');return;}
  const remote=await sbHydrate(_activeProfileId);
  if(!remote){toast('Sin datos en Supabase para este perfil','am');return;}
  applyState(remote);
  try{localStorage.setItem(profileStateKey(_activeProfileId),JSON.stringify(remote));}catch(e){}
  toast('✓ Estado cargado desde Supabase','g');
  render();
}

    <div class="po-item${_activeProfileId===p.id?' active-p':''}" >
      <span class="po-item-name">${p.name}</span>
      <span class="po-item-meta">${p.id===_activeProfileId?'ACTIVE':''}</span>
      <div class="po-item-actions">
        <button class="btn btn-sm btn-go" onclick="loadProfile('${p.id}')">${p.id===_activeProfileId?'ENTER':'SELECT'}</button>
${p.id===_activeProfileId?'<span class="g" style="font-size:9px">● ACTIVE</span>':''}
        <button class="btn btn-sm" onclick="doRenameProfile('${p.id}','${p.name.replace(/'/g,"\\'")}')">REN</button>
        ${p.id!==_activeProfileId?`<button class="btn btn-sm btn-r" onclick="doDeleteProfile('${p.id}','${p.name.replace(/'/g,"\\'")}')">DEL</button>`:''}
      </div>
    </div>`).join(''):`<div style="font-size:10px;color:#333;padding:8px">No hay perfiles. Crea uno abajo.</div>`;

  ol.innerHTML=`
  <div class="po-box">
    <div class="po-title">JORMUNDGANDRSSON</div>
    <div class="po-sub">SELECTOR DE PERFIL DE OPERADOR</div>
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:6px">${sbDot}</div>
    <div class="po-list">${profileItems}</div>
    <div style="border-top:1px solid #161616;padding-top:14px">
      <div style="font-size:8px;color:#444;letter-spacing:1.5px;margin-bottom:6px">CREAR NUEVO PERFIL</div>
      <div class="po-input-row">
        <input id="po-new-name" placeholder="Nombre del operador..." style="height:28px;font-size:11px">
        <button class="btn btn-go" onclick="doCreateProfile()">CREAR</button>
      </div>
    </div>
    ${_activeProfileId?`<div style="text-align:right;margin-top:6px"><button class="btn btn-sm" onclick="document.getElementById('profile-overlay').style.display='none'" style="font-size:9px;color:#444">CANCELAR</button></div>`:''}
    ${!_sbReady?`<div style="margin-top:12px;font-size:9px;color:#444;border-top:1px solid #161616;padding-top:8px">Configura Supabase en <span style="color:#f1c40f">SETTINGS → SUPABASE</span> para sincronización entre operadores.</div>`:''}
  </div>`;
  ol.style.display='flex';
}
async function doCreateProfile(){
  const inp=document.getElementById('po-new-name');if(!inp)return;
  const name=inp.value.trim();if(!name){toast('Nombre requerido','re');return;}
  const pid=createProfile(name);await loadProfile(pid);
}
function doRenameProfile(pid,oldName){
  const n=prompt('Nuevo nombre para "'+oldName+'":',oldName);
  if(!n||!n.trim())return;
  renameProfile(pid,n);
  renderProfileOverlay();
  if(_activeProfileId===pid)render();
}
function doDeleteProfile(pid,name){
  if(!confirm('¿Eliminar perfil "'+name+'"? Todos sus datos serán borrados permanentemente.'))return;
  deleteProfile(pid);
  renderProfileOverlay();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  if(!G._ready)return;
  const hdr=rHeader();const nav=rNav();
  let body='';
  if(G._view==='register'){
    body=`<div class="body">
      <div class="main">
        ${rGlobalControl()}

        <div style="position:relative;flex:1;min-height:0">
          ${isCooldownLocked()?`
            <div style="
              position:absolute;
              inset:0;
              z-index:50;
              background:rgba(5,5,5,0.82);
              border-top:1px solid #3a2000;
              border-bottom:1px solid #3a2000;
              display:flex;
              flex-direction:column;
              align-items:center;
              justify-content:center;
              pointer-events:auto;
              backdrop-filter:blur(2px);
            ">
              <div style="font-size:10px;color:#e67e22;letter-spacing:2px;margin-bottom:8px">
                GLOBAL BLOCK COOLDOWN ACTIVE
              </div>
              <div style="font-size:34px;color:#f1c40f;font-weight:600;letter-spacing:4px">
                ${cooldownNeedsContinue()?'00:00':cooldownText()}
              </div>
              <div style="font-size:9px;color:#555;letter-spacing:1px;margin-top:8px">
                OPEN BLOCK / WIN / LOSS / DRAW BLOQUEADOS TEMPORALMENTE
              </div>
              
              ${cooldownNeedsContinue()?`
                <button class="btn btn-go" style="margin-top:18px;pointer-events:auto;font-size:11px;padding:6px 18px" onclick="continueAfterCooldown()">
                  CONTINUE
                </button>
              `:''}

            </div>
          `:''}

          <div class="brokers" style="flex:1;min-height:0;height:100%">
            ${BIDS.map(id=>rBrokerCard(id)).join('')}
          </div>
        </div>

        ${rDailyTarget()}
      </div>
      <div class="sidebar">${rSidebar()}</div>
    </div>`;
  }else if(G._view==='settings'){
    body=`<div class="body">
      <div class="main">${rSettings()}</div>
      <div class="sidebar">${rSidebar()}</div>
    </div>`;
  }else{
    body=`<div class="body">
      <div class="main">${rHistory()}</div>
      <div class="sidebar">${rSidebar()}</div>
    </div>`;
  }
  document.getElementById('root').innerHTML=hdr+nav+body;
  // Clock tick
  clearInterval(window._clockTick);
  window._clockTick=setInterval(()=>{
    const el=document.getElementById('clock');
    if(el){const n=new Date();el.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');}

    if(G._view==='register' && isCooldownLocked()){
      render();
    }
  },1000);
}

// ─── SAFE RENDER ─────────────────────────────────────────────────────────────
function safeRender(){
  try{
    render();
    console.log('[JORMUND] FINAL RENDER OK');
  }catch(e){
    console.error('[JORMUND] BOOT ERROR',e);
    const root=document.getElementById('root');
    if(root)root.innerHTML=`
      <div style="padding:40px;font-family:'JetBrains Mono',monospace;background:#0a0a0a;color:#e74c3c;min-height:100vh">
        <div style="font-size:14px;font-weight:600;letter-spacing:2px;margin-bottom:12px">BOOT ERROR</div>
        <div style="font-size:11px;color:#888;margin-bottom:16px">Error al renderizar. Revisa la consola (F12) para más detalles.</div>
        <div style="font-size:10px;color:#555;margin-bottom:20px">${String(e).substring(0,200)}</div>
        <button onclick="resetLocalCache()" style="border:1px solid #5c1a1a;background:transparent;color:#e74c3c;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px">RESET LOCAL CACHE</button>
        <div style="font-size:9px;color:#333;margin-top:8px">Nota: solo borra localStorage local. Supabase NO se modifica.</div>
      </div>`;
  }
}

function resetLocalCache(){
  if(!confirm('¿Borrar localStorage local? Los datos en Supabase se conservan.'))return;
  const toKeep=[SB_CFG_KEY];
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('jormund'));
  keys.forEach(k=>{if(!toKeep.includes(k))localStorage.removeItem(k);});
  location.reload();
}

function validateState(){
  // Ensure critical nested objects exist after hydration
  if(typeof G.useRecoveryTickets==='undefined')G.useRecoveryTickets=true;
  if(typeof G.blockCooldownMinutes==='undefined')G.blockCooldownMinutes=5;
  if(typeof G.cooldownUntil==='undefined')G.cooldownUntil=null;
  clearExpiredCooldown();
  if(!G._lf)G._lf={broker:'ALL',result:'ALL',mode:'ALL'};
  if(!G._tree)G._tree={};
  if(!G.days)G.days=[];
  if(!G.capitalHistory)G.capitalHistory=[];
  BIDS.forEach(id=>{
    const br=BS[id];if(!br)return;
    if(!br.sessions)br.sessions=[];
    if(!br.blocks)br.blocks=[];
    if(!br.trades)br.trades=[];
    if(!br.tickets)br.tickets=[];
    if(!br.blockMG)br.blockMG={level:0,accLoss:0};
    if(!br.recState)br.recState={active:false,ticketIds:[],curIdx:0,level:0};
    if(typeof br.initialCapital==='undefined')br.initialCapital=0;
    if(typeof br.capital==='undefined')br.capital=0;
    if(typeof br.enabled==='undefined')br.enabled=true;
    if(typeof br.mgCustomEnabled==='undefined')br.mgCustomEnabled=false;
    if(!Array.isArray(br.mgNormalCustom))br.mgNormalCustom=[];
  });
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
(async function bootSafe(){
  console.log('[JORMUND] BOOT START');

  // STEP 1: Default state is already defined above (G, BS).

  // STEP 2: Load localStorage immediately — no Supabase wait
  console.log('[JORMUND] LOCAL STATE LOADED');
  const list=loadProfileList();
  const pid=getActiveProfileId();

  // STEP 3: If a valid profile exists locally, load it right now
  if(pid&&list.find(p=>p.id===pid)){
    _activeProfileId=pid;
    try{
      const r=localStorage.getItem(profileStateKey(pid));
      if(r){const d=JSON.parse(r);applyState(d);console.log('[JORMUND] HYDRATE START (local)');}
    }catch(e){console.warn('[JORMUND] HYDRATE FAILED (local)',e);}
  }else if(list.length===0){
    // Check for legacy jormund_v5 data and auto-migrate
    const legacy=localStorage.getItem('jormund_v5');
    const newPid=createProfile('DEFAULT');
    if(legacy){try{localStorage.setItem(profileStateKey(newPid),legacy);}catch(e){}}
    _activeProfileId=newPid;
    setActiveProfileId(newPid);
    try{
      const r=localStorage.getItem(profileStateKey(newPid));
      if(r){const d=JSON.parse(r);applyState(d);}
    }catch(e){}
  }

  // STEP 4: Validate & patch state
  validateState();
  console.log('[JORMUND] HYDRATE OK');

  // STEP 5: Mark ready and render IMMEDIATELY — Supabase has NOT been called yet
  G._ready=true;
  console.log('[JORMUND] INITIAL LOCAL RENDER');

  if(_activeProfileId){
    safeRender();
    renderProfileOverlay();
    console.log('[JORMUND] BOOT COMPLETE (profile selector shown)');
  }else{
    G._ready=true;
    safeRender();
    renderProfileOverlay();
    console.log('[JORMUND] BOOT COMPLETE (profile selector shown)');
  }

  // STEP 6: NOW try Supabase in the background — non-blocking
  console.log('[JORMUND] SUPABASE INIT START');
  const sbCfg=sbCfgLoad();
  if(sbCfg.url&&sbCfg.key){
    try{
      const ok=await Promise.race([
        sbInit(sbCfg.url,sbCfg.key),
        new Promise(res=>setTimeout(()=>res(false),8000)) // 8s timeout
      ]);
      if(ok){
        console.log('[JORMUND] SUPABASE INIT OK');
        // Merge remote profiles list
        try{
          const remote=await sbLoadProfiles();
          if(remote&&remote.length){
            const local=loadProfileList();const merged=[...local];
            remote.forEach(rp=>{if(!merged.find(lp=>lp.id===rp.id))merged.push(rp);});
            localStorage.setItem(PROFILE_LIST_KEY,JSON.stringify(merged));
          }
        }catch(e){}
        // Pull remote state for active profile and merge (remote wins)
        if(_activeProfileId){
          console.log('[JORMUND] HYDRATE START (supabase)');
          try{
            const remote=await sbHydrate(_activeProfileId);
            if(remote){
              applyState(remote);validateState();
              localStorage.setItem(profileStateKey(_activeProfileId),JSON.stringify(remote));
              console.log('[JORMUND] HYDRATE OK (supabase)');
              safeRender();
            }
          }catch(e){console.warn('[JORMUND] HYDRATE FAILED (supabase)',e);}
          sbSubscribe(_activeProfileId);
        }
      }else{
        console.warn('[JORMUND] SUPABASE INIT FAILED — operating offline');
        syncIndicator('err','DISCONNECTED');
      }
    }catch(e){
      console.warn('[JORMUND] SUPABASE INIT FAILED',e);
      syncIndicator('err','DISCONNECTED');
    }
  }else{
    console.log('[JORMUND] SUPABASE INIT SKIPPED — no config');
  }
})();
</script>
